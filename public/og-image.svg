<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d1d1f"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <linearGradient id="logobg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(60,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,120)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,180)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo icon -->
  <rect x="80" y="245" width="56" height="56" rx="14" fill="url(#logobg)"/>
  <text x="108" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">B</text>

  <!-- Title -->
  <text x="160" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1.5">Web Project Brief</text>

  <!-- Subtitle -->
  <text x="162" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#8e8e93">Tell us about your vision. We'll build it.</text>

  <!-- Decorative cards preview -->
  <g transform="translate(80, 360)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="200" height="100" rx="12" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="1"/>
    <rect x="16" y="16" width="8" height="8" rx="4" fill="#007AFF"/>
    <text x="32" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8e8e93">GOALS</text>
    <rect x="16" y="36" width="120" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="16" y="50" width="90" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="16" y="64" width="150" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="16" y="78" width="70" height="6" rx="3" fill="#3a3a3c"/>

    <!-- Card 2 -->
    <rect x="220" y="0" width="200" height="100" rx="12" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="1"/>
    <rect x="236" y="16" width="8" height="8" rx="4" fill="#AF52DE"/>
    <text x="252" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8e8e93">AUDIENCE</text>
    <rect x="236" y="36" width="140" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="236" y="50" width="100" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="236" y="64" width="130" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="236" y="78" width="80" height="6" rx="3" fill="#3a3a3c"/>

    <!-- Card 3 -->
    <rect x="440" y="0" width="200" height="100" rx="12" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="1"/>
    <rect x="456" y="16" width="8" height="8" rx="4" fill="#FF2D55"/>
    <text x="472" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8e8e93">IDENTITY</text>
    <rect x="456" y="36" width="110" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="456" y="50" width="150" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="456" y="64" width="80" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="456" y="78" width="120" height="6" rx="3" fill="#3a3a3c"/>

    <!-- Card 4 -->
    <rect x="660" y="0" width="200" height="100" rx="12" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="1"/>
    <rect x="676" y="16" width="8" height="8" rx="4" fill="#34C759"/>
    <text x="692" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8e8e93">DESIGN</text>
    <rect x="676" y="36" width="130" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="676" y="50" width="90" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="676" y="64" width="160" height="6" rx="3" fill="#3a3a3c"/>
    <rect x="676" y="78" width="100" height="6" rx="3" fill="#3a3a3c"/>

    <!-- Fade overlay -->
    <rect x="850" y="0" width="270" height="100" fill="url(#fadeRight)"/>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>

  <!-- Bottom right watermark -->
  <text x="1120" y="590" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#3a3a3c">formulario-webs.vercel.app</text>
</svg>
